
services:
  db:
    image: "mysql:latest"
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: storage
    ports:
      - "3306:3306"  # Map MySQL default port
    volumes:
      - ./db/blueprint.sql:/docker-entrypoint-initdb.d/blueprint.sql

  javaserver:
    container_name: javaserver
    build:
      context: ./javaserver  # Update to the correct directory for your project
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/storage  # Corrected port
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - db  # Ensure db starts before javaserver
    restart: always

  adminer:
    container_name: adminer
    image: adminer:latest
    ports:
      - "4000:8080"  # Access Adminer on port 4000
    restart: always
    depends_on:
      - db  # Ensure Adminer starts after the database
